name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from Actions tab

# Cancel in-progress runs for the same branch / PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1 — Quick Go verification on Linux (fast feedback)
  # ============================================================
  go-verify:
    name: Go vet + build (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash      # ⚠️ required: bash expands ./... globs correctly
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Build frontend first because Go //go:embed all:frontend/dist needs dist/ to exist
      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./... 2>&1 || true   # no tests yet; will fail loudly when added without this guard

  # ============================================================
  # Job 2 — Full Wails build on Windows (produces the .exe artifact)
  # ============================================================
  wails-build-windows:
    name: Wails build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash      # ⚠️ required: bash expands ./... globs correctly
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Wails build
        run: wails build -tags wails

      - name: Copy standards.json into build/bin/data
        run: |
          mkdir -p build/bin/data
          cp data/standards.json build/bin/data/standards.json

      - name: Verify exe exists
        shell: bash
        run: ls -lh build/bin/datasec-suite-app.exe

      - name: Upload exe (artifact, NOT a release)
        uses: actions/upload-artifact@v4
        with:
          name: datasec-suite-app-windows-exe
          path: build/bin/datasec-suite-app.exe
          if-no-files-found: error
          retention-days: 14